<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 848" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0b3d91"/>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <rect width="1200" height="848" fill="#ffffff"/>

  <!-- ===== Formula anchor (no title) ===== -->
  <text x="600" y="56" text-anchor="middle" font-size="48" fill="#0b3d91">
    <tspan font-style="italic">&#951;</tspan><tspan font-size="28" dy="10">L</tspan><tspan dy="-10"> = </tspan>
    <tspan font-style="italic">I</tspan><tspan font-size="24" dy="9">pred</tspan>
    <tspan dy="-9">&#8201;/&#8201;</tspan>
    <tspan font-style="italic">N</tspan><tspan font-size="24" dy="9">max</tspan>
  </text>
  <text x="600" y="98" text-anchor="middle" font-size="20" fill="#555">
    predictive information a system holds about its own environment, divided by the Landauer budget of its own dissipation
  </text>
  <text x="600" y="122" text-anchor="middle" font-size="19" fill="#555">
    <tspan font-style="italic">N</tspan><tspan font-size="13" dy="6">max</tspan><tspan dy="-6"> = </tspan>
    <tspan font-style="italic">E</tspan><tspan font-size="13" dy="6">actual</tspan><tspan dy="-6"> / (</tspan>
    <tspan font-style="italic">k</tspan><tspan font-size="13" dy="6">B</tspan><tspan dy="-6"> </tspan>
    <tspan font-style="italic">T</tspan> ln 2),  in the logically irreversible regime
  </text>

  <!-- ===== HERO: paired loops ===== -->
  <!-- Left: closed self-payment loop, vital -->
  <g transform="translate(60,160)">
    <rect x="0" y="0" width="500" height="252" rx="14" fill="#f3f8f3" stroke="#2e7d32" stroke-width="2"/>
    <text x="250" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#2e7d32">self-payment closed &#8212; &#951;<tspan font-size="15" dy="5">L</tspan><tspan dy="-5"> &gt; 0</tspan></text>

    <rect x="70" y="56" width="280" height="156" rx="12" fill="#ffffff" stroke="#2e7d32" stroke-width="2.5"/>
    <text x="210" y="78" text-anchor="middle" font-size="16" fill="#2e7d32">system X (one physical boundary)</text>
    <circle cx="150" cy="132" r="34" fill="#e8f3e8" stroke="#2e7d32" stroke-width="2"/>
    <text x="150" y="129" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">model</text>
    <text x="150" y="148" text-anchor="middle" font-size="16" fill="#1a1a1a">M</text>
    <circle cx="270" cy="132" r="34" fill="#e8f3e8" stroke="#2e7d32" stroke-width="2"/>
    <text x="270" y="128" text-anchor="middle" font-size="15" fill="#1a1a1a">own</text>
    <text x="270" y="146" text-anchor="middle" font-size="15" fill="#1a1a1a">exergy</text>
    <path d="M184 119 Q210 98 236 119" fill="none" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#ah)"/>
    <path d="M236 145 Q210 166 184 145" fill="none" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#ah)"/>
    <rect x="392" y="100" width="86" height="62" rx="10" fill="#ffffff" stroke="#888" stroke-width="1.5"/>
    <text x="435" y="127" text-anchor="middle" font-size="16" fill="#555">environ-</text>
    <text x="435" y="146" text-anchor="middle" font-size="16" fill="#555">ment E</text>
    <path d="M350 108 C 392 78, 392 78, 414 100" fill="none" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#ah)"/>
    <path d="M414 162 C 392 190, 350 190, 320 172" fill="none" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#ah)"/>
    <text x="250" y="236" text-anchor="middle" font-size="16" fill="#333">error returns as loss of the system's <tspan font-weight="bold">own</tspan> free energy</text>
  </g>

  <!-- Right: open loop, externally paid, non-vital -->
  <g transform="translate(640,160)">
    <rect x="0" y="0" width="500" height="252" rx="14" fill="#f6f6f6" stroke="#9aa0a6" stroke-width="2"/>
    <text x="250" y="34" text-anchor="middle" font-size="24" font-weight="bold" fill="#777">externally paid &#8212; &#951;<tspan font-size="15" dy="5">L</tspan><tspan dy="-5"> = 0</tspan></text>

    <rect x="70" y="56" width="220" height="156" rx="12" fill="#ffffff" stroke="#9aa0a6" stroke-width="2.5"/>
    <text x="180" y="78" text-anchor="middle" font-size="16" fill="#888">candidate system</text>
    <circle cx="180" cy="134" r="34" fill="#eeeeee" stroke="#9aa0a6" stroke-width="2"/>
    <text x="180" y="131" text-anchor="middle" font-size="18" font-weight="bold" fill="#555">model</text>
    <text x="180" y="150" text-anchor="middle" font-size="16" fill="#555">M</text>
    <rect x="360" y="104" width="118" height="60" rx="10" fill="#ffffff" stroke="#b03a2e" stroke-width="2"/>
    <text x="419" y="129" text-anchor="middle" font-size="15" fill="#b03a2e">external grid /</text>
    <text x="419" y="149" text-anchor="middle" font-size="15" fill="#b03a2e">setpoint</text>
    <path d="M360 134 L 296 134" fill="none" stroke="#b03a2e" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#ahg)"/>
    <line x1="322" y1="117" x2="338" y2="151" stroke="#b03a2e" stroke-width="3"/>
    <line x1="338" y1="117" x2="322" y2="151" stroke="#b03a2e" stroke-width="3"/>
    <text x="250" y="236" text-anchor="middle" font-size="16" fill="#777">dissipation paid from outside &#8212; the loop never closes</text>
  </g>

  <!-- ===== η_L strip with six paradigm cases ===== -->
  <text x="600" y="468" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">
    Two-stage procedure ( <tspan font-style="italic">I</tspan><tspan font-size="14" dy="5">v</tspan><tspan dy="-5"> screening &#8594; &#951;</tspan><tspan font-size="14" dy="5">L</tspan><tspan dy="-5"> verification ) over six paradigm cases</tspan>
  </text>

  <!-- axis: positive η_L begins at the η_L = 0 wall -->
  <line x1="300" y1="608" x2="1070" y2="608" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="300" y1="528" x2="300" y2="628" stroke="#b03a2e" stroke-width="4"/>
  <text x="1062" y="666" text-anchor="end" font-size="18" fill="#555">&#951;<tspan font-size="12" dy="4">L</tspan><tspan dy="-4"> &#8594; 1 (theoretical ceiling)</tspan></text>
  <text x="690" y="690" text-anchor="middle" font-size="16" fill="#555" font-style="italic">
    vital iff &#951;<tspan font-size="11" dy="4">L</tspan><tspan dy="-4"> &gt; 0 &#8212; living systems are tiny but strictly positive; absolute value not comparable across classes</tspan>
  </text>

  <!-- η_L = 0 zone (entirely LEFT of the red wall; generous internal padding) -->
  <g>
    <rect x="60" y="506" width="210" height="256" rx="12" fill="#f6f6f6" stroke="#dcdcdc" stroke-width="1.5"/>
    <text x="165" y="544" text-anchor="middle" font-size="20" font-weight="bold" fill="#b03a2e">&#951;<tspan font-size="13" dy="4">L</tspan><tspan dy="-4"> = 0</tspan></text>
    <!-- Sun -->
    <g transform="translate(120,590)">
      <circle r="14" fill="none" stroke="#9aa0a6" stroke-width="2.5"/>
      <g stroke="#9aa0a6" stroke-width="2"><line x1="0" y1="-19" x2="0" y2="-25"/><line x1="0" y1="19" x2="0" y2="25"/><line x1="-19" y1="0" x2="-25" y2="0"/><line x1="19" y1="0" x2="25" y2="0"/><line x1="-14" y1="-14" x2="-18" y2="-18"/><line x1="14" y1="14" x2="18" y2="18"/><line x1="14" y1="-14" x2="18" y2="-18"/><line x1="-14" y1="14" x2="-18" y2="18"/></g>
    </g>
    <text x="120" y="626" text-anchor="middle" font-size="14" fill="#777">Sun</text>
    <!-- hurricane -->
    <g transform="translate(205,588)" stroke="#9aa0a6" stroke-width="2.5" fill="none">
      <path d="M0 -16 C 14 -16 16 0 0 0 C -14 0 -16 16 0 16"/>
      <circle r="2.8" fill="#9aa0a6" stroke="none"/>
    </g>
    <text x="205" y="626" text-anchor="middle" font-size="14" fill="#777">hurricane</text>
    <!-- crystal -->
    <g transform="translate(120,667)" stroke="#9aa0a6" stroke-width="2" fill="none">
      <rect x="-17" y="0" width="34" height="23"/><line x1="-5.7" y1="0" x2="-5.7" y2="23"/><line x1="5.7" y1="0" x2="5.7" y2="23"/><line x1="-17" y1="11.5" x2="17" y2="11.5"/>
    </g>
    <text x="120" y="706" text-anchor="middle" font-size="14" fill="#777">crystal</text>
    <!-- LLM chip -->
    <g transform="translate(205,667)">
      <rect x="-22" y="0" width="44" height="23" rx="3" fill="none" stroke="#9aa0a6" stroke-width="2"/>
      <text x="0" y="17" text-anchor="middle" font-size="13" fill="#777">LLM</text>
    </g>
    <text x="205" y="706" text-anchor="middle" font-size="14" fill="#777">(weights)</text>
    <text x="165" y="732" text-anchor="middle" font-size="14" fill="#777">numerator or</text>
    <text x="165" y="749" text-anchor="middle" font-size="14" fill="#777">denominator fails</text>
  </g>

  <!-- positive points (green): city, biosphere, bacterium -->
  <g transform="translate(385,608)">
    <line x1="0" y1="0" x2="0" y2="-26" stroke="#2e7d32" stroke-width="2"/>
    <circle cy="-26" r="6" fill="#2e7d32"/>
    <g transform="translate(0,-70)" stroke="#2e7d32" stroke-width="2" fill="none">
      <rect x="-16" y="0" width="9" height="22"/><rect x="-4" y="-8" width="9" height="30"/><rect x="8" y="4" width="9" height="18"/>
    </g>
    <text x="0" y="-86" text-anchor="middle" font-size="15" fill="#2e7d32">city</text>
    <text x="0" y="26" text-anchor="middle" font-size="15" fill="#2e7d32">&#8818;3&#183;10&#8315;&#179;&#8304;</text>
  </g>
  <g transform="translate(630,608)">
    <line x1="0" y1="0" x2="0" y2="-26" stroke="#2e7d32" stroke-width="2"/>
    <circle cy="-26" r="6" fill="#2e7d32"/>
    <g transform="translate(0,-72)">
      <circle r="14" fill="none" stroke="#2e7d32" stroke-width="2"/>
      <path d="M-9 4 Q0 -14 9 4 Q0 8 -9 4 z" fill="#2e7d32" stroke="none"/>
    </g>
    <text x="0" y="-92" text-anchor="middle" font-size="15" fill="#2e7d32">biosphere</text>
    <text x="0" y="26" text-anchor="middle" font-size="15" fill="#2e7d32">&#8818;10&#8315;&#185;&#8312;</text>
  </g>
  <g transform="translate(890,608)">
    <line x1="0" y1="0" x2="0" y2="-26" stroke="#2e7d32" stroke-width="2"/>
    <circle cy="-26" r="6" fill="#2e7d32"/>
    <g transform="translate(0,-70)">
      <rect x="-20" y="-9" width="34" height="18" rx="9" fill="none" stroke="#2e7d32" stroke-width="2"/>
      <path d="M14 0 q 9 -6 16 0 q 7 6 14 0" fill="none" stroke="#2e7d32" stroke-width="2"/>
    </g>
    <text x="0" y="-86" text-anchor="middle" font-size="15" fill="#2e7d32">bacterium</text>
    <text x="0" y="26" text-anchor="middle" font-size="15" fill="#2e7d32">~3&#183;10&#8315;&#8312; / 3&#183;10&#8315;&#8309;</text>
  </g>
  <!-- ceiling marker -->
  <g transform="translate(1045,608)">
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#0b3d91" stroke-width="2" stroke-dasharray="4 4"/>
    <circle cy="-30" r="5" fill="none" stroke="#0b3d91" stroke-width="2"/>
    <text x="0" y="-44" text-anchor="middle" font-size="14" fill="#0b3d91">Bennett demon</text>
  </g>

  <!-- ===== tagline ===== -->
  <rect x="60" y="782" width="1080" height="50" rx="10" fill="#0b3d91"/>
  <text x="600" y="814" text-anchor="middle" font-size="23" font-weight="bold" fill="#ffffff">
    Observable matter is structurally complex almost everywhere &#8212; and vital almost nowhere.
  </text>
</svg>
